<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Infinity Finance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f172a'/%3E%3Cpath d='M352 160c-38.5 0-71.6 21.3-96 53.3-24.4-32-57.5-53.3-96-53.3-61.9 0-112 50.1-112 112s50.1 112 112 112c38.5 0 71.6-21.3 96-53.3 24.4 32 57.5 53.3 96 53.3 61.9 0 112-50.1 112-112s-50.1-112-112-112zm0 176c-35.3 0-64-28.7-64-64s28.7-64 64-64 64 28.7 64 64-28.7 64-64 64zm-192 0c-35.3 0-64-28.7-64-64s28.7-64 64-64 64 28.7 64 64-28.7 64-64 64z' fill='%236366f1'/%3E%3C/svg%3E" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-100 text-indigo-600 mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Bem-vindo de volta</h2>
            <p class="text-slate-500 text-sm">Acesse suas finanças</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
            </div>
            
            <div class="text-xs text-red-500 hidden text-center font-bold" id="errorMsg"></div>

            <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-indigo-200">
                Entrar
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">Não tem conta? <a href="#" id="toggleMode" class="text-indigo-600 font-bold hover:underline">Criar conta</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('authForm');
        const toggleLink = document.getElementById('toggleMode');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorMsg = document.getElementById('errorMsg');
        let isLogin = true;

        // Se já estiver logado, vai direto pro app
        if(localStorage.getItem('inf_auth_token')) {
            window.location.href = 'index.html';
        }

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            btnSubmit.innerText = isLogin ? 'Entrar' : 'Criar Conta';
            toggleLink.innerText = isLogin ? 'Criar conta' : 'Já tenho conta';
            errorMsg.classList.add('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? 'http://localhost:3000/login' : 'http://localhost:3000/register';

            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Processando...';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    if (isLogin) {
                        // Salva o "Sessão" no navegador
                        localStorage.setItem('inf_auth_token', data.token);
                        localStorage.setItem('inf_user_email', data.email);
                        window.location.href = 'index.html';
                    } else {
                        alert('Conta criada! Agora faça login.');
                        location.reload();
                    }
                } else {
                    throw new Error(data.message || data.error);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = isLogin ? 'Entrar' : 'Criar Conta';
            }
        });
    </script>
</body>
</html>
